services:
  server:
    build:
      context: ./server
    container_name: server_container
    env_file:
      - ./server/.env
    ports:
      - "9000:9000"
    networks:
      - tutoria_network
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: client_container
    ports:
      - "3000:3000"
    networks:
      - tutoria_network

  postgres:
    image: postgres:latest
    container_name: postgres_container
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - tutoria_network
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  tutoria_network:

volumes:
  pgdata:
    name: tutoria_pgdata